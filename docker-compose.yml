services:
  api:
    build:
      context: ./backend/OpsPilot.Api
    environment:
      ASPNETCORE_URLS: http://+:8080
      UseInfrastructure: "true"
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=opspilot;Username=opspilot;Password=opspilot
      ConnectionStrings__Redis: redis:6379,abortConnect=false
      ConnectionStrings__RabbitMq: amqp://guest:guest@rabbitmq:5672
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opspilot
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
    volumes:
      - ./backend/OpsPilot.Api/Infrastructure/Persistence/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot -d opspilot"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:8-alpine

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
